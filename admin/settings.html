        <div class="admin-content" style="max-width:520px;">
            <div class="admin-card">
                <div class="admin-card-header">
                    <h2>Change Password</h2>
                </div>
                <div id="pwAlert"></div>
                <div class="form-group"><label>New Password</label><input type="password" id="newPw"
                        placeholder="Min. 6 characters"></div>
                <div class="form-group"><label>Confirm New Password</label><input type="password" id="confirmPw"
                        placeholder="Repeat new password"></div>
                <button class="btn-admin primary" id="savePwBtn" style="width:100%;justify-content:center;">Update
                    Password</button>
            </div>

            <div class="admin-card">
                <div class="admin-card-header">
                    <h2>Account Info</h2>
                </div>
                <div class="form-group"><label>Email (cannot be changed here)</label><input type="email"
                        id="currentEmail" disabled style="opacity:0.6;cursor:not-allowed;"></div>
                <p style="font-size:0.8rem;color:#94a3b8;">To change your email, go to Supabase Dashboard →
                    Authentication → Users.</p>
            </div>
        </div>

    <div id="toast" class="toast"></div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase.js"></script>
    <script>
        function showToast(m, t = 'success') { const el = document.getElementById('toast'); el.textContent = m; el.className = `toast ${t}`; setTimeout(() => el.classList.add('show'), 10); setTimeout(() => el.classList.remove('show'), 3000) }

        document.getElementById('savePwBtn').addEventListener('click', async () => {
            const np = document.getElementById('newPw').value;
            const cp = document.getElementById('confirmPw').value;
            const alertEl = document.getElementById('pwAlert');
            alertEl.innerHTML = '';
            if (np.length < 6) { alertEl.innerHTML = '<div class="admin-alert error">Password minimal 6 karakter.</div>'; return }
            if (np !== cp) { alertEl.innerHTML = '<div class="admin-alert error">Password tidak cocok.</div>'; return }
            const SUPABASE_URL = 'https://dizgkuhcblnonvmwiabu.supabase.co';
            const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRpemdrdWhjYmxub252bXdpYWJ1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyODkyMzUsImV4cCI6MjA5Nzg2NTIzNX0.dyQyanPl602AsXQSF6DaCdc34oGbnuMaXNt3YBW4BzE';
            const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
            const { error } = await client.auth.updateUser({ password: np });
            if (error) { alertEl.innerHTML = `<div class="admin-alert error">${error.message}</div>` }
            else { alertEl.innerHTML = '<div class="admin-alert success">Password berhasil diubah.</div>'; document.getElementById('newPw').value = ''; document.getElementById('confirmPw').value = ''; showToast('Password updated') }
        });

        document.addEventListener('DOMContentLoaded', async () => {
            const { data: u } = await SupabaseService.auth.getUser(); if (!u?.user) { window.location.href = 'index.html'; return }
            document.getElementById('topbarUser').textContent = u.user.email;
            document.getElementById('currentEmail').value = u.user.email;
            document.getElementById('logoutBtn').addEventListener('click', async (e) => { e.preventDefault(); await SupabaseService.auth.signOut(); window.location.href = 'index.html' });
            document.getElementById('sidebarToggle').addEventListener('click', () => document.getElementById('sidebar').classList.toggle('open'));
        });
    </script>
