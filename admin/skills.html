            </div>

    <!-- Category Modal -->
    <div class="modal-overlay" id="catModal">
        <div class="modal">
            <div class="modal-header">
                <h3 id="catModalTitle">Add Category</h3><button class="modal-close" onclick="closeCatModal()">✕</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="catEditId">
                <div class="form-group"><label>Category Name *</label><input type="text" id="catName"
                        placeholder="e.g. Web Development"></div>
                <div class="form-group"><label>Sort Order</label><input type="number" id="catOrder" value="0" min="0">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-admin secondary" onclick="closeCatModal()">Cancel</button>
                <button class="btn-admin primary" id="saveCatBtn">Save</button>
            </div>
        </div>
    </div>

    <!-- Skill Modal -->
    <div class="modal-overlay" id="skillModal">
        <div class="modal">
            <div class="modal-header">
                <h3 id="skillModalTitle">Add Skill</h3><button class="modal-close"
                    onclick="closeSkillModal()">✕</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="skillEditId">
                <div class="form-group"><label>Category *</label><select id="skillCatId"></select></div>
                <div class="form-row">
                    <div class="form-group"><label>Skill Name *</label><input type="text" id="skillName"
                            placeholder="e.g. Laravel"></div>
                    <div class="form-group"><label>Percentage (0-100)</label><input type="number" id="skillPct"
                            value="80" min="0" max="100"></div>
                </div>
                <div class="form-group"><label>Sort Order</label><input type="number" id="skillOrder" value="0" min="0">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-admin secondary" onclick="closeSkillModal()">Cancel</button>
                <button class="btn-admin primary" id="saveSkillBtn">Save</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase.js"></script>
    <script>
        let allCats = [];
        function esc(s) { return s ? String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;') : '' }
        function showToast(m, t = 'success') { const el = document.getElementById('toast'); el.textContent = m; el.className = `toast ${t}`; setTimeout(() => el.classList.add('show'), 10); setTimeout(() => el.classList.remove('show'), 3000) }
        function closeCatModal() { document.getElementById('catModal').classList.remove('open'); document.getElementById('catEditId').value = ''; document.getElementById('catName').value = ''; document.getElementById('catOrder').value = 0 }
        function closeSkillModal() { document.getElementById('skillModal').classList.remove('open'); document.getElementById('skillEditId').value = ''; document.getElementById('skillName').value = ''; document.getElementById('skillPct').value = 80; document.getElementById('skillOrder').value = 0 }

        function renderSkills() {
            const c = document.getElementById('skillsContent');
            if (!allCats.length) { c.innerHTML = '<p style="color:#94a3b8;text-align:center;padding:40px;">No categories yet. Add one first.</p>'; return }
            c.innerHTML = allCats.map(cat => `
        <div class="admin-card" style="margin-bottom:20px;">
            <div class="admin-card-header">
                <h2>${esc(cat.name)}</h2>
                <div style="display:flex;gap:8px;">
                    <button class="btn-admin sm secondary" onclick="editCat('${cat.id}')">Edit</button>
                    <button class="btn-admin sm danger" onclick="deleteCat('${cat.id}')">Delete</button>
                </div>
            </div>
            <div class="admin-table-wrap">
                <table class="admin-table">
                    <thead><tr><th>Skill</th><th>Percentage</th><th>Actions</th></tr></thead>
                    <tbody>${(cat.skills || []).length ? cat.skills.map(s => `
                        <tr>
                            <td><strong>${esc(s.name)}</strong></td>
                            <td><div style="display:flex;align-items:center;gap:10px;"><div class="skill-bar-wrap"><div class="skill-bar-fill" style="width:${s.percentage}%"></div></div><span style="font-size:0.82rem;font-weight:700;color:#475569;">${s.percentage}%</span></div></td>
                            <td><div class="table-actions"><button class="btn-admin sm secondary" onclick="editSkill('${s.id}','${cat.id}')">Edit</button><button class="btn-admin sm danger" onclick="deleteSkill('${s.id}')">Delete</button></div></td>
                        </tr>`).join('') : '<tr><td colspan="3" style="text-align:center;padding:16px;color:#94a3b8;">No skills in this category</td></tr>'}
                    </tbody>
                </table>
            </div>
        </div>`).join('')
        }

        function editCat(id) {
            const c = allCats.find(x => x.id === id); if (!c) return;
            document.getElementById('catEditId').value = c.id;
            document.getElementById('catName').value = c.name;
            document.getElementById('catOrder').value = c.sort_order || 0;
            document.getElementById('catModalTitle').textContent = 'Edit Category';
            document.getElementById('catModal').classList.add('open');
        }

        async function deleteCat(id) {
            if (!confirm('Delete this category and all its skills?')) return;
            const { error } = await SupabaseService.skills.deleteCategory(id);
            if (error) { showToast('Failed to delete', 'error'); return }
            await reload(); showToast('Category deleted');
        }

        function editSkill(sid, cid) {
            let skill = null;
            for (const c of allCats) { const s = c.skills?.find(x => x.id === sid); if (s) { skill = s; break } }
            if (!skill) return;
            document.getElementById('skillEditId').value = skill.id;
            document.getElementById('skillCatId').value = cid;
            document.getElementById('skillName').value = skill.name;
            document.getElementById('skillPct').value = skill.percentage;
            document.getElementById('skillOrder').value = skill.sort_order || 0;
            document.getElementById('skillModalTitle').textContent = 'Edit Skill';
            document.getElementById('skillModal').classList.add('open');
        }

        async function deleteSkill(id) {
            if (!confirm('Delete this skill?')) return;
            const { error } = await SupabaseService.skills.deleteItem(id);
            if (error) { showToast('Failed', 'error'); return }
            await reload(); showToast('Skill deleted');
        }

        async function reload() {
            const { data } = await SupabaseService.skills.getAll(); allCats = data || []; renderSkills();
            const sel = document.getElementById('skillCatId');
            sel.innerHTML = allCats.map(c => `<option value="${c.id}">${esc(c.name)}</option>`).join('');
        }

        document.getElementById('saveCatBtn').addEventListener('click', async () => {
            const id = document.getElementById('catEditId').value;
            const name = document.getElementById('catName').value.trim();
            if (!name) { showToast('Name required', 'error'); return }
            const payload = { name, sort_order: parseInt(document.getElementById('catOrder').value) || 0 };
            let res;
            if (id) res = await SupabaseService.skills.updateCategory(id, payload);
            else res = await SupabaseService.skills.createCategory(payload);
            if (res.error) { showToast('Failed: ' + res.error.message, 'error'); return }
            await reload(); closeCatModal(); showToast(id ? 'Category updated' : 'Category created');
        });

        document.getElementById('saveSkillBtn').addEventListener('click', async () => {
            const id = document.getElementById('skillEditId').value;
            const name = document.getElementById('skillName').value.trim();
            const cid = document.getElementById('skillCatId').value;
            if (!name || !cid) { showToast('Name and category required', 'error'); return }
            const payload = { name, category_id: cid, percentage: parseInt(document.getElementById('skillPct').value) || 0, sort_order: parseInt(document.getElementById('skillOrder').value) || 0 };
            let res;
            if (id) res = await SupabaseService.skills.updateItem(id, payload);
            else res = await SupabaseService.skills.createItem(payload);
            if (res.error) { showToast('Failed: ' + res.error.message, 'error'); return }
            await reload(); closeSkillModal(); showToast(id ? 'Skill updated' : 'Skill created');
        });

        document.addEventListener('DOMContentLoaded', async () => {
            const { data: u } = await SupabaseService.auth.getUser(); if (!u?.user) { window.location.href = 'index.html'; return }
            document.getElementById('logoutBtn').addEventListener('click', async (e) => { e.preventDefault(); await SupabaseService.auth.signOut(); window.location.href = 'index.html' });
            document.getElementById('sidebarToggle').addEventListener('click', () => document.getElementById('sidebar').classList.toggle('open'));
            document.getElementById('addCatBtn').addEventListener('click', () => { document.getElementById('catEditId').value = ''; document.getElementById('catName').value = ''; document.getElementById('catOrder').value = 0; document.getElementById('catModalTitle').textContent = 'Add Category'; document.getElementById('catModal').classList.add('open') });
            document.getElementById('addSkillBtn').addEventListener('click', () => { document.getElementById('skillEditId').value = ''; document.getElementById('skillName').value = ''; document.getElementById('skillPct').value = 80; document.getElementById('skillOrder').value = 0; document.getElementById('skillModalTitle').textContent = 'Add Skill'; document.getElementById('skillModal').classList.add('open') });
            await reload();
        });
    </script>
</body>
