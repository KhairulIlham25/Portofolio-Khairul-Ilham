    <div class="modal-overlay" id="expModal">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modalTitle">Add Experience</h3><button class="modal-close" id="closeModal">✕</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editId">
                <div class="form-group"><label>Title *</label><input type="text" id="fTitle"
                        placeholder="e.g. Web Developer Intern"></div>
                <div class="form-row">
                    <div class="form-group"><label>Company</label><input type="text" id="fCompany"
                            placeholder="Company name"></div>
                    <div class="form-group"><label>Period</label><input type="text" id="fPeriod"
                            placeholder="Jan 2026 — Now"></div>
                </div>
                <div class="form-group"><label>Description</label><textarea id="fDesc" rows="4"
                        placeholder="What did you do?"></textarea></div>
                <div class="form-group"><label>Tags (comma separated)</label><input type="text" id="fTags"
                        placeholder="Laravel, Tailwind, Scrum"></div>
                <div class="form-group"><label>Sort Order</label><input type="number" id="fOrder" value="0" min="0">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-admin secondary" id="cancelModal">Cancel</button>
                <button class="btn-admin primary" id="saveBtn">Save</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase.js"></script>
    <script>
        let allExp = [];
        function esc(s) { return s ? String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;') : '' }
        function showToast(m, t = 'success') { const el = document.getElementById('toast'); el.textContent = m; el.className = `toast ${t}`; setTimeout(() => el.classList.add('show'), 10); setTimeout(() => el.classList.remove('show'), 3000) }
        function openModal() { document.getElementById('expModal').classList.add('open') }
        function closeModal() { document.getElementById('expModal').classList.remove('open'); resetForm() }
        function resetForm() { ['editId', 'fTitle', 'fCompany', 'fPeriod', 'fDesc', 'fTags'].forEach(id => document.getElementById(id).value = ''); document.getElementById('fOrder').value = 0; document.getElementById('modalTitle').textContent = 'Add Experience' }

        function renderExp() {
            const body = document.getElementById('expBody');
            if (!allExp.length) { body.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:32px;color:#94a3b8;">No experiences yet</td></tr>'; return }
            body.innerHTML = allExp.map(e => `
        <tr>
            <td><strong>${esc(e.title)}</strong></td>
            <td>${esc(e.company || '—')}</td>
            <td><span class="badge-status read">${esc(e.period || '—')}</span></td>
            <td>${(e.tags || []).map(t => `<span class="badge-category" style="background:#f1f5f9;color:#475569;margin-right:3px;font-size:0.68rem;">${esc(t)}</span>`).join('')}</td>
            <td><div class="table-actions"><button class="btn-admin sm secondary" onclick="editExp('${e.id}')">Edit</button><button class="btn-admin sm danger" onclick="deleteExp('${e.id}')">Delete</button></div></td>
        </tr>`).join('')
        }

        function editExp(id) {
            const e = allExp.find(x => x.id === id); if (!e) return;
            document.getElementById('editId').value = e.id;
            document.getElementById('fTitle').value = e.title || '';
            document.getElementById('fCompany').value = e.company || '';
            document.getElementById('fPeriod').value = e.period || '';
            document.getElementById('fDesc').value = e.description || '';
            document.getElementById('fTags').value = (e.tags || []).join(', ');
            document.getElementById('fOrder').value = e.sort_order || 0;
            document.getElementById('modalTitle').textContent = 'Edit Experience';
            openModal();
        }

        async function deleteExp(id) {
            if (!confirm('Delete this experience?')) return;
            const { error } = await SupabaseService.experiences.delete(id);
            if (error) { showToast('Failed to delete', 'error'); return }
            allExp = allExp.filter(x => x.id !== id); renderExp(); showToast('Experience deleted');
        }

        document.getElementById('saveBtn').addEventListener('click', async () => {
            const id = document.getElementById('editId').value;
            const title = document.getElementById('fTitle').value.trim();
            if (!title) { showToast('Title is required', 'error'); return }
            const tags = document.getElementById('fTags').value.split(',').map(t => t.trim()).filter(Boolean);
            const payload = { title, company: document.getElementById('fCompany').value, period: document.getElementById('fPeriod').value, description: document.getElementById('fDesc').value, tags, sort_order: parseInt(document.getElementById('fOrder').value) || 0 };
            let res;
            if (id) res = await SupabaseService.experiences.update(id, payload);
            else res = await SupabaseService.experiences.create(payload);
            if (res.error) { showToast('Save failed: ' + res.error.message, 'error'); return }
            const { data } = await SupabaseService.experiences.getAll(); allExp = data || []; renderExp();
            closeModal(); showToast(id ? 'Updated' : 'Created');
        });

        document.addEventListener('DOMContentLoaded', async () => {
            const { data: u } = await SupabaseService.auth.getUser(); if (!u?.user) { window.location.href = 'index.html'; return }
            document.getElementById('logoutBtn').addEventListener('click', async (e) => { e.preventDefault(); await SupabaseService.auth.signOut(); window.location.href = 'index.html' });
            document.getElementById('sidebarToggle').addEventListener('click', () => document.getElementById('sidebar').classList.toggle('open'));
            document.getElementById('addBtn').addEventListener('click', () => { resetForm(); openModal() });
            document.getElementById('closeModal').addEventListener('click', closeModal);
            document.getElementById('cancelModal').addEventListener('click', closeModal);
            const { data } = await SupabaseService.experiences.getAll(); allExp = data || []; renderExp();
        });
    </script>
</body>
