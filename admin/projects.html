    <!-- Modal -->
    <div class="modal-overlay" id="projectModal">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modalTitle">Add Project</h3>
                <button class="modal-close" id="closeModal">✕</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editId">
                <div class="form-group"><label>Title *</label><input type="text" id="fTitle"
                        placeholder="Project title"></div>
                <div class="form-row">
                    <div class="form-group"><label>Category</label>
                        <select id="fCategory">
                            <option value="development">Development</option>
                            <option value="design">Design</option>
                            <option value="fullstack">Full Stack</option>
                        </select>
                    </div>
                    <div class="form-group"><label>Tags (comma separated)</label><input type="text" id="fTags"
                            placeholder="Laravel, Tailwind, MySQL"></div>
                </div>
                <div class="form-group"><label>Description</label><textarea id="fDesc" rows="3"
                        placeholder="Project description"></textarea></div>
                <div class="form-row">
                    <div class="form-group"><label>GitHub URL</label><input type="url" id="fGithub"
                            placeholder="https://github.com/..."></div>
                    <div class="form-group"><label>Demo URL</label><input type="url" id="fDemo"
                            placeholder="https://..."></div>
                </div>
                <div class="form-group"><label>Figma URL</label><input type="url" id="fFigma"
                        placeholder="https://figma.com/..."></div>
                <div class="form-group">
                    <label>Project Image</label>
                    <input type="file" id="fImage" accept="image/*">
                    <div id="currentImg" style="margin-top:8px;display:none;"><img id="previewImg" src=""
                            style="width:100%;max-height:160px;object-fit:cover;border-radius:8px;"></div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-admin secondary" id="cancelModal">Cancel</button>
                <button class="btn-admin primary" id="saveBtn">Save Project</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase.js"></script>
    <script>
        let allProjects = [];
        function esc(s) { return s ? String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;') : ''; }
        function showToast(msg, type = 'success') { const t = document.getElementById('toast'); t.textContent = msg; t.className = `toast ${type}`; setTimeout(() => t.classList.add('show'), 10); setTimeout(() => t.classList.remove('show'), 3000); }
        function openModal() { document.getElementById('projectModal').classList.add('open'); }
        function closeModal() { document.getElementById('projectModal').classList.remove('open'); resetForm(); }
        function resetForm() { document.getElementById('editId').value = ''; document.getElementById('fTitle').value = ''; document.getElementById('fCategory').value = 'development'; document.getElementById('fTags').value = ''; document.getElementById('fDesc').value = ''; document.getElementById('fGithub').value = ''; document.getElementById('fDemo').value = ''; document.getElementById('fFigma').value = ''; document.getElementById('fImage').value = ''; document.getElementById('currentImg').style.display = 'none'; document.getElementById('modalTitle').textContent = 'Add Project'; }

        function renderProjects() {
            const body = document.getElementById('projectsBody');
            if (!allProjects.length) { body.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:32px;color:#94a3b8;">No projects yet</td></tr>'; return; }
            body.innerHTML = allProjects.map(p => `
        <tr>
            <td>${p.image_url ? `<img src="${esc(p.image_url)}" style="width:56px;height:40px;object-fit:cover;border-radius:6px;">` : '-'}</td>
            <td><strong>${esc(p.title)}</strong></td>
            <td><span class="badge-category">${esc(p.category)}</span></td>
            <td>${(p.tags || []).slice(0, 3).map(t => `<span class="badge-category" style="background:#f1f5f9;color:#475569;margin-right:3px;font-size:0.68rem;">${esc(t)}</span>`).join('')}</td>
            <td>${[p.github_url && '<a href="' + esc(p.github_url) + '" target="_blank" style="color:#1d4ed8;font-size:0.8rem;">GitHub</a>', p.demo_url && '<a href="' + esc(p.demo_url) + '" target="_blank" style="color:#1d4ed8;font-size:0.8rem;">Demo</a>'].filter(Boolean).join(' · ') || '—'}</td>
            <td><div class="table-actions"><button class="btn-admin sm secondary" onclick="editProject('${p.id}')">Edit</button><button class="btn-admin sm danger" onclick="deleteProject('${p.id}')">Delete</button></div></td>
        </tr>`).join('');
        }

        function editProject(id) {
            const p = allProjects.find(x => x.id === id); if (!p) return;
            document.getElementById('editId').value = p.id;
            document.getElementById('fTitle').value = p.title || '';
            document.getElementById('fCategory').value = p.category || 'development';
            document.getElementById('fTags').value = (p.tags || []).join(', ');
            document.getElementById('fDesc').value = p.description || '';
            document.getElementById('fGithub').value = p.github_url || '';
            document.getElementById('fDemo').value = p.demo_url || '';
            document.getElementById('fFigma').value = p.figma_url || '';
            if (p.image_url) { document.getElementById('previewImg').src = p.image_url; document.getElementById('currentImg').style.display = 'block'; }
            document.getElementById('modalTitle').textContent = 'Edit Project';
            openModal();
        }

        async function deleteProject(id) {
            if (!confirm('Delete this project?')) return;
            const p = allProjects.find(x => x.id === id);
            if (p?.image_url) { const path = p.image_url.split('/storage/v1/object/public/projects/')[1]; if (path) await SupabaseService.storage.delete('projects', path); }
            const { error } = await SupabaseService.projects.delete(id);
            if (error) { showToast('Failed to delete', 'error'); return; }
            allProjects = allProjects.filter(x => x.id !== id); renderProjects(); showToast('Project deleted');
        }

        document.getElementById('saveBtn').addEventListener('click', async () => {
            const id = document.getElementById('editId').value;
            const title = document.getElementById('fTitle').value.trim();
            if (!title) { showToast('Title is required', 'error'); return; }
            const tags = document.getElementById('fTags').value.split(',').map(t => t.trim()).filter(Boolean);
            let image_url = id ? (allProjects.find(x => x.id === id)?.image_url || null) : null;
            const file = document.getElementById('fImage').files[0];
            if (file) {
                const path = `${Date.now()}-${file.name}`;
                const { error: upErr } = await SupabaseService.storage.upload('projects', path, file);
                if (upErr) { showToast('Image upload failed', 'error'); return; }
                image_url = SupabaseService.storage.getUrl('projects', path);
            }
            const payload = { title, category: document.getElementById('fCategory').value, description: document.getElementById('fDesc').value, tags, github_url: document.getElementById('fGithub').value || null, demo_url: document.getElementById('fDemo').value || null, figma_url: document.getElementById('fFigma').value || null, image_url };
            let res;
            if (id) res = await SupabaseService.projects.update(id, payload);
            else res = await SupabaseService.projects.create(payload);
            if (res.error) { showToast('Save failed: ' + res.error.message, 'error'); return; }
            const { data } = await SupabaseService.projects.getAll(); allProjects = data || []; renderProjects();
            closeModal(); showToast(id ? 'Project updated' : 'Project created');
        });

        document.addEventListener('DOMContentLoaded', async () => {
            const { data: u } = await SupabaseService.auth.getUser(); if (!u?.user) { window.location.href = 'index.html'; return; }
            document.getElementById('logoutBtn').addEventListener('click', async (e) => { e.preventDefault(); await SupabaseService.auth.signOut(); window.location.href = 'index.html'; });
            document.getElementById('sidebarToggle').addEventListener('click', () => document.getElementById('sidebar').classList.toggle('open'));
            document.getElementById('addBtn').addEventListener('click', () => { resetForm(); openModal(); });
            document.getElementById('closeModal').addEventListener('click', closeModal);
            document.getElementById('cancelModal').addEventListener('click', closeModal);
            const { data } = await SupabaseService.projects.getAll(); allProjects = data || []; renderProjects();
        });
    </script>
</body>
