        <div class="admin-content">

                                <th>Title</th>
                                <th>Category</th>
                                <th>Status</th>
                                <th>Read Time</th>
                                <th>Date</th>
                                <th>Actions</th>

                        </thead>

                        </tbody>

    <!-- Modal -->
    <div class="modal-overlay" id="articleModal">
        <div class="modal" style="width:min(680px,100%);">
            <div class="modal-header">
                <h3 id="modalTitle">Add Article</h3>
                <button class="modal-close" id="closeModal">✕</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editId">
                <div class="form-group"><label>Title *</label><input type="text" id="fTitle" placeholder="Article title"
                        oninput="autoSlug()"></div>
                <div class="form-row">
                    <div class="form-group"><label>Slug</label><input type="text" id="fSlug"
                            placeholder="auto-generated"></div>
                    <div class="form-group"><label>Category</label><input type="text" id="fCategory"
                            placeholder="Web Development"></div>
                </div>
                <div class="form-group"><label>Excerpt</label><textarea id="fExcerpt" rows="2"
                        placeholder="Short description..."></textarea></div>
                <div class="form-group"><label>Content</label><textarea id="fContent" rows="6"
                        placeholder="Full article content..."></textarea></div>
                <div class="form-row">
                    <div class="form-group"><label>Tags (comma separated)</label><input type="text" id="fTags"
                            placeholder="Laravel, PHP, Web"></div>
                    <div class="form-group"><label>Read Time (minutes)</label><input type="number" id="fReadTime"
                            value="5" min="1"></div>
                </div>
                <div class="form-group">
                    <label>Published</label>
                    <select id="fPublished">
                        <option value="false">Draft</option>
                        <option value="true">Published</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Thumbnail</label>
                    <input type="file" id="fThumb" accept="image/*">
                    <div id="currentThumb" style="margin-top:8px;display:none;"><img id="previewThumb" src=""
                            style="width:100%;max-height:120px;object-fit:cover;border-radius:8px;"></div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-admin secondary" id="cancelModal">Cancel</button>
                <button class="btn-admin primary" id="saveBtn">Save Article</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase.js"></script>
    <script>
        let allArticles = [];
        function esc(s) { return s ? String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;') : '' }
        function showToast(msg, type = 'success') { const t = document.getElementById('toast'); t.textContent = msg; t.className = `toast ${type}`; setTimeout(() => t.classList.add('show'), 10); setTimeout(() => t.classList.remove('show'), 3000) }
        function autoSlug() { const t = document.getElementById('fTitle').value; document.getElementById('fSlug').value = t.toLowerCase().replace(/[^a-z0-9\s-]/g, '').trim().replace(/\s+/g, '-') }
        function openModal() { document.getElementById('articleModal').classList.add('open') }
        function closeModal() { document.getElementById('articleModal').classList.remove('open'); resetForm() }
        function resetForm() { ['editId', 'fTitle', 'fSlug', 'fCategory', 'fExcerpt', 'fContent', 'fTags'].forEach(id => document.getElementById(id).value = ''); document.getElementById('fReadTime').value = 5; document.getElementById('fPublished').value = 'false'; document.getElementById('fThumb').value = ''; document.getElementById('currentThumb').style.display = 'none'; document.getElementById('modalTitle').textContent = 'Add Article' }

        function renderArticles() {
            const body = document.getElementById('articlesBody');
            if (!allArticles.length) { body.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:32px;color:#94a3b8;">No articles yet</td></tr>'; return }
            body.innerHTML = allArticles.map(a => `
        <tr>
            <td>${a.thumbnail_url ? `<img src="${esc(a.thumbnail_url)}" style="width:56px;height:40px;object-fit:cover;border-radius:6px;">` : '-'}</td>
            <td><strong>${esc(a.title)}</strong><br><small style="color:#94a3b8;">${esc(a.slug)}</small></td>
            <td><span class="badge-category">${esc(a.category || '—')}</span></td>
            <td><span class="badge-status ${a.published ? 'published' : 'draft'}">${a.published ? 'Published' : 'Draft'}</span></td>
            <td>${a.read_time || 5} min</td>
            <td>${new Date(a.created_at).toLocaleDateString('id-ID')}</td>
            <td><div class="table-actions"><button class="btn-admin sm secondary" onclick="editArticle('${a.id}')">Edit</button><button class="btn-admin sm danger" onclick="deleteArticle('${a.id}')">Delete</button></div></td>
        </tr>`).join('')
        }

        function editArticle(id) {
            const a = allArticles.find(x => x.id === id); if (!a) return;
            document.getElementById('editId').value = a.id;
            document.getElementById('fTitle').value = a.title || '';
            document.getElementById('fSlug').value = a.slug || '';
            document.getElementById('fCategory').value = a.category || '';
            document.getElementById('fExcerpt').value = a.excerpt || '';
            document.getElementById('fContent').value = a.content || '';
            document.getElementById('fTags').value = (a.tags || []).join(', ');
            document.getElementById('fReadTime').value = a.read_time || 5;
            document.getElementById('fPublished').value = a.published ? 'true' : 'false';
            if (a.thumbnail_url) { document.getElementById('previewThumb').src = a.thumbnail_url; document.getElementById('currentThumb').style.display = 'block' }
            document.getElementById('modalTitle').textContent = 'Edit Article';
            openModal();
        }

        async function deleteArticle(id) {
            if (!confirm('Delete this article?')) return;
            const { error } = await SupabaseService.articles.delete(id);
            if (error) { showToast('Failed to delete', 'error'); return }
            allArticles = allArticles.filter(x => x.id !== id); renderArticles(); showToast('Article deleted');
        }

        document.getElementById('saveBtn').addEventListener('click', async () => {
            const id = document.getElementById('editId').value;
            const title = document.getElementById('fTitle').value.trim();
            if (!title) { showToast('Title is required', 'error'); return }
            const tags = document.getElementById('fTags').value.split(',').map(t => t.trim()).filter(Boolean);
            let thumbnail_url = id ? (allArticles.find(x => x.id === id)?.thumbnail_url || null) : null;
            const file = document.getElementById('fThumb').files[0];
            if (file) {
                const path = `${Date.now()}-${file.name}`;
                const { error: upErr } = await SupabaseService.storage.upload('articles', path, file);
                if (upErr) { showToast('Thumbnail upload failed', 'error'); return }
                thumbnail_url = SupabaseService.storage.getUrl('articles', path);
            }
            const payload = { title, slug: document.getElementById('fSlug').value || title.toLowerCase().replace(/\s+/g, '-'), category: document.getElementById('fCategory').value, excerpt: document.getElementById('fExcerpt').value, content: document.getElementById('fContent').value, tags, read_time: parseInt(document.getElementById('fReadTime').value) || 5, published: document.getElementById('fPublished').value === 'true', thumbnail_url };
            let res;
            if (id) res = await SupabaseService.articles.update(id, payload);
            else res = await SupabaseService.articles.create(payload);
            if (res.error) { showToast('Save failed: ' + res.error.message, 'error'); return }
            const { data } = await SupabaseService.articles.getAll(); allArticles = data || []; renderArticles();
            closeModal(); showToast(id ? 'Article updated' : 'Article created');
        });

        document.addEventListener('DOMContentLoaded', async () => {
            const { data: u } = await SupabaseService.auth.getUser(); if (!u?.user) { window.location.href = 'index.html'; return }
            document.getElementById('logoutBtn').addEventListener('click', async (e) => { e.preventDefault(); await SupabaseService.auth.signOut(); window.location.href = 'index.html' });
            document.getElementById('sidebarToggle').addEventListener('click', () => document.getElementById('sidebar').classList.toggle('open'));
            document.getElementById('addBtn').addEventListener('click', () => { resetForm(); openModal() });
            document.getElementById('closeModal').addEventListener('click', closeModal);
            document.getElementById('cancelModal').addEventListener('click', closeModal);
            const { data } = await SupabaseService.articles.getAll(); allArticles = data || []; renderArticles();
        });
    </script>
</body>
