    <!-- Detail Modal -->
    <div class="modal-overlay" id="detailModal">
        <div class="modal" style="width:min(600px,100%);">
            <div class="modal-header">
                <h3 id="modalSubject">Message Detail</h3>
                <button class="modal-close" id="closeDetail">✕</button>
            </div>
            <div class="modal-body">
                <p style="margin-bottom:8px;"><strong>From:</strong> <span id="modalName"></span> &lt;<span
                        id="modalEmail"></span>&gt;</p>
                <p style="margin-bottom:16px;font-size:0.8rem;color:#94a3b8;" id="modalDate"></p>
                <div id="modalMessage"
                    style="background:#f8fafc;border-radius:10px;padding:16px;font-size:0.9rem;line-height:1.75;white-space:pre-wrap;">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-admin secondary sm" id="closeDetail2">Close</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase.js"></script>
    <script>
        let allMessages = [];
        let currentFilter = 'all';

        function esc(s) { return s ? String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;') : ''; }

        function showToast(msg, type = 'success') {
            const t = document.getElementById('toast');
            t.textContent = msg; t.className = `toast ${type}`;
            setTimeout(() => t.classList.add('show'), 10);
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        function renderMessages() {
            const body = document.getElementById('messagesBody');
            let data = allMessages;
            if (currentFilter === 'unread') data = data.filter(m => !m.is_read);
            if (currentFilter === 'read') data = data.filter(m => m.is_read);
            if (data.length === 0) { body.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:32px;color:#94a3b8;">No messages</td></tr>'; return; }
            body.innerHTML = data.map(m => `
        <tr>
            <td><strong>${esc(m.name)}</strong></td>
            <td>${esc(m.email)}</td>
            <td><a href="#" onclick="viewMsg('${m.id}');return false;" style="color:#1d4ed8;font-weight:600;">${esc(m.subject || '(no subject)')}</a></td>
            <td>${new Date(m.created_at).toLocaleDateString('id-ID')}</td>
            <td><span class="badge-status ${m.is_read ? 'read' : 'unread'}">${m.is_read ? 'Read' : 'Unread'}</span></td>
            <td>
                <div class="table-actions">
                    <button class="btn-admin sm ${m.is_read ? 'secondary' : 'success'}" onclick="toggleRead('${m.id}',${m.is_read})">${m.is_read ? 'Mark Unread' : 'Mark Read'}</button>
                    <button class="btn-admin sm danger" onclick="deleteMsg('${m.id}')">Delete</button>
                </div>
            </td>
        </tr>`).join('');
        }

        function viewMsg(id) {
            const m = allMessages.find(x => x.id === id);
            if (!m) return;
            document.getElementById('modalSubject').textContent = m.subject || '(no subject)';
            document.getElementById('modalName').textContent = m.name;
            document.getElementById('modalEmail').textContent = m.email;
            document.getElementById('modalDate').textContent = new Date(m.created_at).toLocaleString('id-ID');
            document.getElementById('modalMessage').textContent = m.message || '';
            document.getElementById('detailModal').classList.add('open');
            if (!m.is_read) toggleRead(id, false, true);
        }

        async function toggleRead(id, currentRead, silent = false) {
            const { error } = await SupabaseService.contacts.markRead(id, !currentRead);
            if (error) { if (!silent) showToast('Failed to update', 'error'); return; }
            const m = allMessages.find(x => x.id === id);
            if (m) m.is_read = !currentRead;
            renderMessages();
            if (!silent) showToast(!currentRead ? 'Marked as read' : 'Marked as unread');
        }

        async function deleteMsg(id) {
            if (!confirm('Delete this message?')) return;
            const { error } = await SupabaseService.contacts.delete(id);
            if (error) { showToast('Failed to delete', 'error'); return; }
            allMessages = allMessages.filter(m => m.id !== id);
            renderMessages();
            showToast('Message deleted');
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const { data: u } = await SupabaseService.auth.getUser();
            if (!u?.user) { window.location.href = 'index.html'; return; }
            document.getElementById('topbarUser').textContent = u.user.email;
            document.getElementById('logoutBtn').addEventListener('click', async (e) => { e.preventDefault(); await SupabaseService.auth.signOut(); window.location.href = 'index.html'; });
            document.getElementById('sidebarToggle').addEventListener('click', () => document.getElementById('sidebar').classList.toggle('open'));
            document.getElementById('closeDetail').addEventListener('click', () => document.getElementById('detailModal').classList.remove('open'));
            document.getElementById('closeDetail2').addEventListener('click', () => document.getElementById('detailModal').classList.remove('open'));

            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentFilter = btn.dataset.filter;
                    renderMessages();
                });
            });

            const { data } = await SupabaseService.contacts.getAll();
            allMessages = data || [];
            renderMessages();
        });
    </script>
